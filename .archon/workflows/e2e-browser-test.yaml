name: e2e-browser-test
description: "E2E browser testing of Caffe-YA using agent-browser CLI + Claude"
provider: claude

env:
  ANTHROPIC_AUTH_TOKEN: "$ANTHROPIC_AUTH_TOKEN"
  ANTHROPIC_BASE_URL: "$ANTHROPIC_BASE_URL"

nodes:
  - id: open-app
    prompt: |
      Use agent-browser to open the Caffe-YA app and take screenshots.
      Run these commands:
      1. agent-browser open http://213.199.56.120:3000 --args "--no-sandbox,--disable-gpu" --screenshot /tmp/caffe-ya-landing.png
      2. agent-browser snapshot --screenshot /tmp/caffe-ya-signin.png

      Then analyze the screenshots using the vision tool:
      - /tmp/caffe-ya-landing.png: Describe what you see. Check for: page loads, sign-in form visible, no errors.
      - /tmp/caffe-ya-signin.png: Confirm sign-in form fields visible.

      Report page title, form state, any visible issues.
    allowed_tools: []

  - id: login
    prompt: |
      Use agent-browser to sign in to the app.
      Run: agent-browser fill --selector "input[type='email'],input[name='email']" "test_admin@caffe.ya" && agent-browser fill --selector "input[type='password']" "test1234"
      Then: agent-browser click --selector "button[type='submit']"
      Wait 5 seconds, then: agent-browser snapshot --screenshot /tmp/caffe-ya-dashboard.png
      Then: agent-browser close

      Analyze /tmp/caffe-ya-dashboard.png:
      - Dashboard loaded?
      - Navigation sidebar visible?
      - Any error messages?

      Report login success/failure and page state.
    allowed_tools: []

  - id: test-nav
    prompt: |
      For each page, run: agent-browser open <URL> --args "--no-sandbox,--disable-gpu" --screenshot /tmp/<page>.png
      Then analyze the screenshot.

      Pages to test:
      1. http://213.199.56.120:3000/ar/dashboard → /tmp/dashboard.png
      2. http://213.199.56.120:3000/ar/pos → /tmp/pos.png
      3. http://213.199.56.120:3000/ar/inventory → /tmp/inventory.png
      4. http://213.199.56.120:3000/ar/accounting/reports → /tmp/accounting.png

      For each: report PASS/FAIL, visible elements, any errors.
    allowed_tools: []

  - id: summary
    prompt: |
      Analyze all screenshots from the test:
      /tmp/caffe-ya-landing.png, /tmp/caffe-ya-signin.png, /tmp/caffe-ya-dashboard.png
      /tmp/dashboard.png, /tmp/pos.png, /tmp/inventory.png, /tmp/accounting.png

      Summarize:
      1. Each page: PASS/FAIL with evidence from screenshots
      2. Any bugs or visual issues
      3. Overall app health
    depends_on: [test-nav]
